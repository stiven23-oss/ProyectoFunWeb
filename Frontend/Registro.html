<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Servicio de Autenticación</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-card {
      width: 100%;
      max-width: 450px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .result-box {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }
  </style>
</head>

<body>

  <div class="card register-card p-4">
    <div class="card-body">
      <h2 class="text-center mb-4">Crear Cuenta</h2>

      <form id="registerForm">
        <div class="mb-3">
          <label for="username" class="form-label">Usuario</label>
          <input type="text" class="form-control" id="username" placeholder="Ingrese su usuario" required />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="Ingrese su correo" required />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required />
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="confirmPassword"
            placeholder="Confirme su contraseña" required />
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-success" id="btnRegister">
            Registrarse
          </button>
        </div>
      </form>

      <!-- Volver al login -->
      <div class="text-center mt-2">
        <small class="text-muted">¿Ya tienes cuenta?</small><br />
        <a href="index.html" class="fw-bold">Iniciar sesión</a>
      </div>

      <div id="alertContainer" class="mt-3"></div>

      <div class="mt-3">
        <h6>Respuesta del servicio</h6>
        <div id="result" class="border rounded p-3 bg-light result-box">
          Aún no se ha enviado el registro.
        </div>
      </div>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById("registerForm");
    const alertContainer = document.getElementById("alertContainer");
    const resultBox = document.getElementById("result");
    const btnRegister = document.getElementById("btnRegister");

    // ⚠️ Cambia esta URL por la de tu backend
    const API_URL = "http://localhost:8080/api/v1/auth/register";

    registerForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      clearAlert();

      // ✅ Validación básica
      if (password !== confirmPassword) {
        showAlert("danger", "Las contraseñas no coinciden.");
        return;
      }

      resultBox.textContent = "Procesando registro...";
      btnRegister.disabled = true;
      btnRegister.textContent = "Registrando...";

      const requestBody = {
        username: username,
        email: email,
        password: password
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(requestBody)
        });

        const data = await response.json();

        resultBox.textContent = JSON.stringify(data, null, 2);

        if (response.ok && data.succes) {
          showAlert("success", "Registro exitoso. Ahora puedes iniciar sesión.");
        } else {
          let mensaje = "No fue posible registrarse.";

          if (data.errors && Array.isArray(data.errors)) {
            mensaje = data.errors.join(", ");
          } else if (data.message) {
            mensaje = data.message;
          }

          showAlert("danger", mensaje);
        }

      } catch (error) {
        console.error("Error:", error);

        resultBox.textContent = JSON.stringify({
          succes: false,
          message: "Error de conexión",
          detail: error.message
        }, null, 2);

        showAlert("danger", "Error al conectar con el servidor.");
      } finally {
        btnRegister.disabled = false;
        btnRegister.textContent = "Registrarse";
      }
    });

    function showAlert(type, message) {
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
    }

    function clearAlert() {
      alertContainer.innerHTML = "";
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
