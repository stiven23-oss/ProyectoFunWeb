<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Servicio de Autenticación</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .result-box {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }
  </style>
</head>

<body>

  <div class="card login-card p-4">
    <div class="card-body">
      <h2 class="text-center mb-4">Iniciar Sesión</h2>

      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">Usuario</label>
          <input type="text" class="form-control" id="username" name="username"
            placeholder="Ingrese su usuario" required />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" name="password"
            placeholder="Ingrese su contraseña" required />
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary" id="btnLogin">
            Ingresar
          </button>
        </div>

        <!-- 🔥 CORRECCIÓN IMPORTANTE AQUÍ -->
        <div class="text-center mt-2">
          <small class="text-muted">¿No tienes cuenta?</small><br />
          <!-- ⚠️ Usa ruta RELATIVA -->
          <a href="./Registro.html" class="fw-bold">
            Registrarse
          </a>
        </div>

      </form>

      <div id="alertContainer" class="mt-3"></div>

      <div class="mt-3">
        <h6>Respuesta del servicio</h6>
        <div id="result" class="border rounded p-3 bg-light result-box">
          Aún no se ha consumido el servicio.
        </div>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const alertContainer = document.getElementById("alertContainer");
    const resultBox = document.getElementById("result");
    const btnLogin = document.getElementById("btnLogin");

    const API_URL = "http://localhost:8080/api/v1/auth/login";

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      clearAlert();
      resultBox.textContent = "Procesando solicitud...";
      btnLogin.disabled = true;
      btnLogin.textContent = "Validando...";

      const requestBody = {
        username: username,
        password: password
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(requestBody)
        });

        const data = await response.json();

        resultBox.textContent = JSON.stringify(data, null, 2);

        if (response.ok && data.succes) {
          showAlert("success", "Login exitoso.");

          localStorage.setItem("usuarioAutenticado", JSON.stringify(data.data));

        } else {
          let mensaje = "No fue posible iniciar sesión.";

          if (data.errors && Array.isArray(data.errors) && data.errors.length > 0) {
            mensaje = data.errors.join(", ");
          } else if (data.message) {
            mensaje = data.message;
          }

          showAlert("danger", mensaje);
        }
      } catch (error) {
        console.error("Error al consumir el servicio:", error);

        resultBox.textContent = JSON.stringify({
          succes: false,
          message: "Error de conexión",
          detail: error.message
        }, null, 2);

        showAlert(
          "danger",
          "No fue posible conectarse al servicio."
        );
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = "Ingresar";
      }
    });

    function showAlert(type, message) {
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
    }

    function clearAlert() {
      alertContainer.innerHTML = "";
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
